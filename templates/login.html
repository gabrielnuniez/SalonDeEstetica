{% extends "base.html" %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh;">
    
    <header style="text-align: center; margin-bottom: 30px;">
        <div style="display: inline-flex; justify-content: center; align-items: center; width: 80px; height: 80px; background: rgba(0,122,255,0.1); border-radius: 50%; margin-bottom: 16px;">
            <span class="material-symbols-rounded" style="font-size: 40px; color: var(--accent-blue);">lock</span>
        </div>
        <h1 class="title-large">Acceso Privado</h1>
        <p class="subtitle">Uso exclusivo del consultorio.</p>
    </header>

    <div style="background: var(--card-bg); border-radius: var(--border-radius-lg); padding: 32px; box-shadow: var(--shadow-soft); width: 100%; max-width: 400px;">
        
        {% if error %}
        <div style="background: #ffebee; color: #d32f2f; padding: 12px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-weight: 500; font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: block;">Usuario</label>
            <input type="text" class="ios-input" name="usuario" placeholder="Ej: admin" required>

            <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: block;">Contraseña</label>
            <input type="password" class="ios-input" name="contrasena" placeholder="••••••••" required>

            <button type="submit" class="ios-btn-submit" style="margin-top: 10px;">Ingresar</button>
        </form>
    </div>
</div>
{% endblock %}
