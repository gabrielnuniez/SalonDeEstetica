{% extends "base.html" %}

{% block content %}
<header style="margin-bottom: 30px;">
    <a href="/" style="color: var(--accent-blue); text-decoration: none; display: flex; align-items: center; gap: 4px; font-weight: 500; margin-bottom: 16px;">
        <span class="material-symbols-rounded">arrow_back_ios</span>
        Volver
    </a>
    <h1 class="title-large">Nuevo Turno</h1>
    <p class="subtitle">Completá tus datos para agendar la visita.</p>
</header>

<div style="background: var(--card-bg); border-radius: var(--border-radius-lg); padding: 32px 24px; box-shadow: var(--shadow-soft);">
    <form action="/guardar_turno" method="POST">
        
        {% if error %}
        <div style="background: #ffebee; color: #d32f2f; padding: 12px 16px; border-radius: 12px; margin-bottom: 20px; font-weight: 500; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
            <span class="material-symbols-rounded">error</span>
            {{ error }}
        </div>
        {% endif %}

        <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: block;">Nombre Completo</label>
        <input type="text" class="ios-input" name="nombre" placeholder="Ej: Juan Pérez" value="{{ datos.nombre if datos else '' }}" required>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div>
                <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: block;">DNI</label>
                <input type="number" class="ios-input" name="dni" placeholder="Sin puntos" value="{{ datos.dni if datos else '' }}" required>
            </div>
            <div>
                <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: block;">Teléfono</label>
                <input type="tel" class="ios-input" name="telefono" placeholder="Ej: 3735 123456" value="{{ datos.telefono if datos else '' }}" required>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 16px; margin-bottom: 8px;">
            <div>
                <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: block;">Edad</label>
                <input type="number" class="ios-input" name="edad" placeholder="Ej: 35" required>
            </div>
            <div>
                <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: block;">Alergias / Preexistencias</label>
                <input type="text" class="ios-input" name="alergias" placeholder="Ej: Ninguna, Diabético, etc." required>
            </div>
        </div>

        <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: block;">Dirección</label>
        <input type="text" class="ios-input" name="direccion" placeholder="Ej: San Martín 123" value="{{ datos.direccion if datos else '' }}" required>

        <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: block;">Cobertura Médica</label>
        <select class="ios-input" name="tipo_cobertura" id="tipo_cobertura" onchange="mostrarObraSocial()" required>
            <option value="Particular" {% if not datos or datos.tipo_cobertura == 'Particular' %}selected{% endif %}>Atención Particular</option>
            <option value="Obra Social" {% if datos and datos.tipo_cobertura == 'Obra Social' %}selected{% endif %}>Tengo Obra Social / Prepaga</option>
        </select>

        <div id="div_nombre_os" style="display: {% if datos and datos.tipo_cobertura == 'Obra Social' %}block{% else %}none{% endif %};">
            <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: block;">¿Cuál es tu Obra Social?</label>
            <input type="text" class="ios-input" name="nombre_os" id="input_nombre_os" placeholder="Ej: INSSSEP, OSDE, etc." value="{{ datos.nombre_os if datos else '' }}">
        </div>

        <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: block;">Tratamiento</label>
        <select class="ios-input" name="tratamiento" required>
            <option value="" disabled {% if not datos or not datos.tratamiento %}selected{% endif %}>Seleccione una opción...</option>
            <option value="Consulta General" {% if datos and datos.tratamiento == 'Consulta General' %}selected{% endif %}>Consulta General</option>
            <option value="Limpieza Dental" {% if datos and datos.tratamiento == 'Limpieza Dental' %}selected{% endif %}>Limpieza Dental</option>
            <option value="Ortodoncia" {% if datos and datos.tratamiento == 'Ortodoncia' %}selected{% endif %}>Ortodoncia</option>
            <option value="Extracción" {% if datos and datos.tratamiento == 'Extracción' %}selected{% endif %}>Extracción</option>
        </select>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div>
                <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: block;">Fecha</label>
                <input type="date" class="ios-input" name="fecha" id="fecha_turno" value="{{ datos.fecha if datos else '' }}" required>
            </div>
            <div>
                <label style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: block;">Hora Disponible</label>
                <select class="ios-input" name="hora" id="hora_turno" required disabled>
                    <option value="">Elegí una fecha primero...</option>
                </select>
            </div>
        </div>

        <button type="submit" id="btn-confirmar" class="ios-btn-submit" style="margin-top: 10px;">Confirmar Turno</button>
    </form>
</div>

<script>
    // Mostrar/Ocultar Obra social
    function mostrarObraSocial() {
        var select = document.getElementById("tipo_cobertura");
        var divOS = document.getElementById("div_nombre_os");
        var inputOS = document.getElementById("input_nombre_os");
        
        if (select.value === "Obra Social") {
            divOS.style.display = "block";
            inputOS.required = true;
        } else {
            divOS.style.display = "none";
            inputOS.required = false;
        }
    }

    // --- LÓGICA DE TURNOS INTELIGENTE (CONECTADA A LA API) ---
    const fechaInput = document.getElementById('fecha_turno');
    const horaSelect = document.getElementById('hora_turno');

    // Bloquear fechas del pasado
    const hoy = new Date().toISOString().split('T')[0];
    fechaInput.setAttribute('min', hoy);

    fechaInput.addEventListener('change', async function() {
        const fechaSeleccionada = this.value;
        if (!fechaSeleccionada) return;

        // Validar que no sea Domingo (Día 0)
        const diaSemana = new Date(fechaSeleccionada + 'T00:00:00').getDay();
        if (diaSemana === 0) { 
            alert('El consultorio permanece cerrado los días domingo. Por favor, elegí otra fecha.');
            this.value = '';
            horaSelect.innerHTML = '<option value="">Elegí una fecha primero...</option>';
            horaSelect.disabled = true;
            return;
        }

        // Mostrar estado de carga
        horaSelect.disabled = true;
        horaSelect.innerHTML = '<option value="">Buscando lugares libres...</option>';

        try {
            // 1. Buscamos los horarios configurados por la doctora DIRECTO DEL SERVIDOR
            const respuestaBase = await fetch('/api/horarios_base');
            const horariosDoctora = await respuestaBase.json();

            // 2. Consultamos qué horarios ya están tomados
            const respuestaOcupadas = await fetch('/api/disponibilidad/' + fechaSeleccionada);
            const horasOcupadas = await respuestaOcupadas.json();

            // Limpiamos el selector
            horaSelect.innerHTML = '<option value="" disabled selected>Seleccioná la hora...</option>';
            let hayLugaresLibres = false;

            // 3. Comparamos y mostramos solo los libres
            horariosDoctora.forEach(hora => {
                if (!horasOcupadas.includes(hora)) {
                    horaSelect.innerHTML += `<option value="${hora}">${hora} hs</option>`;
                    hayLugaresLibres = true;
                }
            });

            if (!hayLugaresLibres) {
                horaSelect.innerHTML = '<option value="" disabled>Agenda llena este día</option>';
            } else {
                // Desbloqueamos el selector para que el paciente elija
                horaSelect.disabled = false;
            }
        } catch (error) {
            console.error("Error buscando turnos:", error);
            horaSelect.innerHTML = '<option value="" disabled>Error de conexión</option>';
        }
    });

    // Si el formulario vuelve recargado con una fecha, disparamos el evento para que cargue las horas
    if (fechaInput.value) {
        fechaInput.dispatchEvent(new Event('change'));
    }
    document.querySelector('form').onsubmit = function() {
    const btn = document.getElementById('btn-confirmar');
    btn.innerText = "Procesando turno...";
    btn.style.opacity = "0.7";
    btn.disabled = true; // Evita el doble clic
};
</script>
{% endblock %}
